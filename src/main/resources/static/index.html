<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unsaid — Mini Social</title>
  <link rel="stylesheet" href="app.css"/>
</head>
<body>
  <div class="bg"></div>

  <header class="topbar">
    <div class="brand">
      <div class="logo">U</div>
      <div>
        <div class="title">Unsaid</div>
        <div class="subtitle">say less. post more.</div>
      </div>
    </div>

    <div class="userchip" id="userChip" hidden>
      <span id="chipHandle"></span>
      <button class="btn btn-ghost" id="logoutBtn">Logout</button>
    </div>
  </header>

  <main class="wrap">
    <!-- LOGIN -->
    <section class="card" id="loginCard">
      <h2>Login</h2>
      <p class="muted">Demo login (no real auth). Handle save hota hai and same handle posts/comments me use hota hai.</p>

      <div class="grid2">
        <div>
          <label>Handle</label>
          <input id="handleInput" placeholder="e.g. blue-1234" maxlength="40"/>
        </div>
        <div>
          <label>Password</label>
          <input id="passInput" type="password" placeholder="anything" />
        </div>
      </div>

      <button class="btn" id="loginBtn">Enter</button>
      
    </section>

    <!-- APP -->
    <section class="card" id="appCard" hidden>
      <div class="row">
        <h2>Home Feed</h2>
        <button class="btn btn-ghost" id="refreshBtn">Refresh</button>
      </div>

      <div class="composer">
        <textarea id="postContent" placeholder="Write a new post..." maxlength="1000"></textarea>
        <div class="row">
          <div class="muted" id="charCount">0 / 1000</div>
          <button class="btn" id="postBtn">Post</button>
        </div>
      </div>

      <div id="feed" class="feed"></div>
    </section>
  </main>

  <footer class="footer">
    <span>API: <code id="apiBaseLabel"></code></span>
    <span class="dot">•</span>
    <span class="muted">Spring Boot + H2 (file) + simple UI</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
